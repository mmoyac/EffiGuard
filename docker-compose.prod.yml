version: "3.9"

# Este archivo va en el VPS: /root/docker/EffiGuard/docker-compose.yml
# Las imágenes se actualizan vía GitHub Actions (no se buildea aquí)

services:
  postgres:
    image: postgres:16-alpine
    container_name: effiguard_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    image: mmoyac/effiguard-backend:latest
    container_name: effiguard_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ENVIRONMENT: production
    networks:
      - internal

  frontend:
    image: mmoyac/effiguard-frontend:latest
    container_name: effiguard_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal
      - general-net

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
  general-net:
    external: true
