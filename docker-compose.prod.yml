version: "3.9"

# Este archivo va en el VPS: /root/docker/EffiGuard/docker-compose.yml
# Las imágenes se actualizan vía GitHub Actions (no se buildea aquí)

services:
  postgres:
    image: postgres:16-alpine
    container_name: effiguard_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  backend:
    image: mmoyac/effiguard-backend:latest
    container_name: effiguard_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ENVIRONMENT: production
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  frontend:
    image: mmoyac/effiguard-frontend:latest
    container_name: effiguard_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal
      - general-net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  backup:
    image: postgres:16-alpine
    container_name: effiguard_backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    networks:
      - internal
    # Cron: diario a las 2am, retención 7 días
    entrypoint: >
      /bin/sh -c '
        echo "Backup service iniciado"
        while true; do
          NOW_SECS=$$(( $$(date +%H) * 3600 + $$(date +%M) * 60 + $$(date +%S) ))
          TARGET_SECS=7200
          if [ $$NOW_SECS -lt $$TARGET_SECS ]; then
            WAIT=$$((TARGET_SECS - NOW_SECS))
          else
            WAIT=$$((86400 - NOW_SECS + TARGET_SECS))
          fi
          echo "Proximo backup en $$WAIT segundos (2:00am)"
          sleep $$WAIT

          FILENAME="/backups/effiguard_$$(date +%Y-%m-%d).sql.gz"
          echo "Ejecutando backup: $$FILENAME"
          pg_dump -h postgres -U $$POSTGRES_USER $$POSTGRES_DB | gzip > $$FILENAME

          if [ $$? -eq 0 ]; then
            echo "Backup completado: $$FILENAME"
          else
            echo "ERROR: Backup fallido"
          fi

          echo "Eliminando backups con mas de 7 dias..."
          find /backups -name "effiguard_*.sql.gz" -mtime +7 -delete
          echo "Limpieza completada"
        done
      '
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
  general-net:
    external: true
