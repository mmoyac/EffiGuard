# Archivo para el VPS: /root/nginx-proxy/conf.d/effiguard.conf
#
# Cubre todos los subdominios del patrón: effiguard-*.lexastech.cl
# Requiere wildcard cert: /etc/letsencrypt/live/lexastech.cl/
#
# Si aún no tenés el wildcard cert, generarlo con:
#   docker compose exec certbot certbot certonly \
#     --manual --preferred-challenges dns \
#     -d "*.lexastech.cl" -d "lexastech.cl"
#
# Para agregar un tenant nuevo: solo crear el cert si no usás wildcard.
# Con wildcard no se necesita hacer nada más — nginx ya lo cubre.

# Redirigir HTTP → HTTPS para todos los subdominios effiguard-*
server {
    listen 80;
    server_name ~^effiguard-[^.]+\.lexastech\.cl$;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS para todos los subdominios effiguard-*
server {
    listen 443 ssl;
    server_name ~^effiguard-[^.]+\.lexastech\.cl$;

    # Wildcard cert cubre *.lexastech.cl
    ssl_certificate     /etc/letsencrypt/live/lexastech.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lexastech.cl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Proxy todo hacia el contenedor frontend de EffiGuard
    # (el frontend nginx interno maneja /api/ → backend)
    location / {
        proxy_pass http://effiguard_frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
