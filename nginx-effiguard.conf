# Plantilla para un tenant de EffiGuard
# Reemplazar TENANT_SLUG por el slug real (ej: propublix)
# Archivo en VPS: /root/docker/nginx-proxy/conf.d/effiguard-TENANT_SLUG.conf
#
# Para agregar un tenant nuevo usar el script: scripts/add-tenant.sh

# Redirigir HTTP → HTTPS
server {
    listen 80;
    server_name effiguard-TENANT_SLUG.lexastech.cl;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — wildcard cert *.lexastech.cl cubre todos los subdominios
server {
    listen 443 ssl;
    server_name effiguard-TENANT_SLUG.lexastech.cl;

    ssl_certificate     /etc/letsencrypt/live/lexastech.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lexastech.cl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://effiguard_frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
